name: Build

on:
  push:
    branches: [main]
  pull_request: {}
  release:
    types: [published]

jobs:
  build-macos-arm64:
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: brew install pcre gmp

      - name: Install GHCup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | \
            BOOTSTRAP_HASKELL_NONINTERACTIVE=1 \
            BOOTSTRAP_HASKELL_GHC_VERSION=9.2.8 \
            BOOTSTRAP_HASKELL_INSTALL_STACK=1 \
            BOOTSTRAP_HASKELL_INSTALL_HLS=0 sh
          echo "$HOME/.ghcup/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Haskell build
        uses: actions/cache@v4
        with:
          key: haskell-macos-arm64-${{ hashFiles('duckling-ffi/stack.yaml', 'duckling-ffi/duckling-ffi.cabal') }}
          path: |
            ~/.stack
            duckling-ffi/.stack-work

      - name: Build Haskell FFI library
        working-directory: duckling-ffi
        run: stack build --system-ghc --allow-different-user

      - name: Build fat static library
        run: |
          STACK_SNAP=$(find ~/.stack/snapshots -type d -name "aarch64-osx-ghc-9.2.8" | head -1)
          GHC_RTS_DIR=$(find $(ghc --print-libdir) -type d -name "rts-*" | head -1)
          FFI_OBJ_DIR=$(find duckling-ffi/.stack-work -type d -name "build" -path "*/ghc-9.2.8/*" | head -1)
          mkdir -p ext_lib
          ghc \
            -staticlib -no-hs-main -fPIC \
            -o ext_lib/libducklingffi.a \
            -L"$GHC_RTS_DIR" \
            -package-db "$STACK_SNAP/pkgdb" \
            -package duckling -package aeson -package text -package bytestring \
            -package string-conversions -package extra -package unordered-containers \
            -package directory -package time -package timezone-olson \
            -package timezone-series -package filepath \
            duckling-ffi/DucklingFFI/FFI.hs

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --interpreter python${{ matrix.python-version }}

      - name: Install and test
        run: |
          pip install target/wheels/*.whl
          pip install pytest pendulum
          pytest -x -v duckling/tests

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64-py${{ matrix.python-version }}
          path: target/wheels/*.whl

  publish:
    needs: [build-macos-arm64]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          merge-multiple: true

      - name: Upload wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: wheels/*.whl
